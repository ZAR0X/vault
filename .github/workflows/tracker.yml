name: DSA Tracker (auto)

# Nightly (23:50 IST): pull LeetCode solved count + fold in today's aptitude,
# compute streak + debt vs quota, update TRACKER.md + status, commit back.
# Needs repo VARIABLE: LEETCODE_USER  (set it to: zarox)

on:
  schedule:
    - cron: '20 18 * * *'   # 23:50 IST
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: repo-writer        # shared with inbox.yml so they never push at once
  cancel-in-progress: false

jobs:
  track:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Update stats
        env:
          LEETCODE_USER: ${{ vars.LEETCODE_USER }}
        run: |
          if [ -z "${LEETCODE_USER}" ]; then
            echo "Set repo variable LEETCODE_USER (= zarox) to enable auto-tracking. Skipping."; exit 0
          fi
          Q='{"query":"query($u:String!){matchedUser(username:$u){submitStatsGlobal{acSubmissionNum{difficulty count}}}}","variables":{"u":"'"${LEETCODE_USER}"'"}}'
          RESP=$(curl -s https://leetcode.com/graphql \
            -H 'Content-Type: application/json' -H 'User-Agent: Mozilla/5.0' -H 'Referer: https://leetcode.com' \
            -d "$Q")
          TOTAL=$(echo "$RESP" | jq -r '.data.matchedUser.submitStatsGlobal.acSubmissionNum[]? | select(.difficulty=="All") | .count')
          if ! echo "$TOTAL" | grep -qE '^[0-9]+$'; then
            echo "Could not read LeetCode stats; skipping. Response: $RESP"; exit 0
          fi

          LAST=0; STREAK=0; DEBT=0
          if [ -f state.json ]; then
            LAST=$(jq -r '.last_total // 0' state.json)
            STREAK=$(jq -r '.streak // 0' state.json)
            DEBT=$(jq -r '.debt // 0' state.json)
          fi

          TODAY=$(TZ=Asia/Kolkata date +%F)
          DOW=$(TZ=Asia/Kolkata date +%u); QUOTA=6; [ "$DOW" = "7" ] && QUOTA=12
          SOLVED=$((TOTAL - LAST)); [ "$SOLVED" -lt 0 ] && SOLVED=0
          if [ "$SOLVED" -ge "$QUOTA" ]; then
            STREAK=$((STREAK + 1)); EXTRA=$((SOLVED - QUOTA)); DEBT=$((DEBT - EXTRA)); [ "$DEBT" -lt 0 ] && DEBT=0
          else
            DEBT=$((DEBT + QUOTA - SOLVED)); STREAK=0
          fi

          ATODAY=$(jq -r --arg d "$TODAY" 'if (.date==$d) then .today else 0 end' apti.json 2>/dev/null || echo 0)
          [ -z "$ATODAY" ] && ATODAY=0

          printf '{"date":"%s","last_total":%s,"streak":%s,"debt":%s}\n' "$TODAY" "$TOTAL" "$STREAK" "$DEBT" > state.json
          printf '📈 Latest: %s/%s DSA · streak %sd · DEBT %s · apti today %s · LC total %s' \
            "$SOLVED" "$QUOTA" "$STREAK" "$DEBT" "$ATODAY" "$TOTAL" > status.txt

          LINE="| $TODAY | $(TZ=Asia/Kolkata date +%a) | $QUOTA | $SOLVED | $DEBT | streak ${STREAK}d · apti ${ATODAY} |"
          if grep -q '<!--LOG-END-->' TRACKER.md; then
            awk -v line="$LINE" '/<!--LOG-END-->/{print line} {print}' TRACKER.md > TRACKER.tmp && mv TRACKER.tmp TRACKER.md
          fi

          git config user.name  "ZAR0X"
          git config user.email "mineiszarox@gmail.com"
          git add state.json status.txt TRACKER.md
          git commit -m "auto: $TODAY dsa=$SOLVED debt=$DEBT streak=$STREAK apti=$ATODAY" || { echo "nothing to commit"; exit 0; }
          git pull --rebase --autostash || true
          git push
